<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      padding: 20px;
    }
    
    .chat-container { 
      width: 100%;
      max-width: 480px;
      height: 650px; 
      background: white; 
      border-radius: 24px; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
    }
    
    .chat-header { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .header-avatar {
      width: 46px;
      height: 46px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    
    .header-info h2 { 
      color: white; 
      font-size: 18px;
      font-weight: 600;
    }
    
    .header-info p { 
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 2px;
    }
    
    .online-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    
    .chat-messages { 
      flex: 1; 
      padding: 20px; 
      overflow-y: auto; 
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    
    .msg { display: flex; align-items: flex-end; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }
    
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .msg.ai .msg-avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
    
    .msg-bubble { 
      max-width: 72%;
      padding: 12px 16px; 
      border-radius: 18px; 
      font-size: 14px; 
      line-height: 1.6;
    }
    
    .msg.user .msg-bubble { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .msg.ai .msg-bubble { 
      background: white;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .msg-time {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 4px;
      text-align: right;
    }
    
    .msg.ai .msg-time { text-align: left; }
    
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px 10px;
      color: #94a3b8;
      font-size: 13px;
    }
    
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    
    .chat-input { 
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #f1f5f9;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .chat-input input { 
      flex: 1;
      padding: 12px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
    }
    
    .chat-input input:focus { 
      border-color: #667eea;
      background: white;
    }
    
    .chat-input button { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    
    .chat-input button:hover { transform: scale(1.05); }
    .chat-input button:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <h2>AI Assistant</h2>
        <p><span class="online-dot"></span>Online — Ready to help</p>
      </div>
    </div>
    
    <div class="chat-messages" id="chat-messages">
      <div class="msg ai">
        <div class="msg-avatar">🤖</div>
        <div>
          <div class="msg-bubble">Hello! I'm your AI Assistant. How can I help you today? 😊</div>
          <div class="msg-time">Just now</div>
        </div>
      </div>
    </div>
    
    <div class="typing-indicator" id="typing" style="display:none;">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      AI is thinking...
    </div>
    
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    function getTime() {
      return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    async function sendMessage() {
      var input = document.getElementById('user-input');
      var messages = document.getElementById('chat-messages');
      var typing = document.getElementById('typing');
      var userText = input.value.trim();
      if (!userText) return;

      messages.innerHTML += `
        <div class="msg user">
          <div class="msg-avatar">👤</div>
          <div>
            <div class="msg-bubble">${userText}</div>
            <div class="msg-time">${getTime()}</div>
          </div>
        </div>`;
      
      input.value = '';
      typing.style.display = 'flex';
      messages.scrollTop = messages.scrollHeight;

      try {
        var response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            messages: [{ role: 'user', content: userText }] 
          })
        });

        var data = await response.json();
        var aiText = data.content[0].text;
        typing.style.display = 'none';
        
        messages.innerHTML += `
          <div class="msg ai">
            <div class="msg-avatar">🤖</div>
            <div>
              <div class="msg-bubble">${aiText}</div>
              <div class="msg-time">${getTime()}</div>
            </div>
          </div>`;
        
        messages.scrollTop = messages.scrollHeight;

      } catch(err) {
        typing.style.display = 'none';
        messages.innerHTML += `
          <div class="msg ai">
            <div class="msg-avatar">🤖</div>
            <div>
              <div class="msg-bubble">Kuch masla hua, dobara koshish karein!</div>
              <div class="msg-time">${getTime()}</div>
            </div>
          </div>`;
      }
    }

    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
